<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Pokemon #1</button>
    <button id="mem2-button">Pokemon #2</button>
    <button id="mem3-button">Pokemon #3</button>
    <h1>My Top Three Pokemon</h1>
    <ol>
      <li>
        <h3 id="mem1">Pokemon #1</h3>
        <p>More about this memory.</p>
        <img class="poke1" src="https://img.pokemondb.net/artwork/large/gengar.jpg" width="100">
      </li>

      <li>
        <h3 id="mem2">Pokemon #2</h3>
        <p>More about this memory.</p>
        <img class="poke2" src ="https://oyster.ignimgs.com/mediawiki/apis.ign.com/pokemon-switch/a/a7/GalarianPonyta.jpg?width=396&format=jpg&auto=webp&quality=80" width="100">
      </li>

      <li>
        <h3 id="mem3">Pokemon #3</h3>
        <p>More about this memory</p>
        <img class="poke3" src ="https://img.pokemondb.net/artwork/large/vaporeon.jpg" width="100">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $(".poke1").hide();
      $(".poke2").hide();
      $(".poke3").hide();

      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
        $("#mem1").text("Gengar");
        $("p").text("I like this pokemon");
        $(".poke1").show(1000);
    
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "pink");
        $("#mem2").text("Ponyta");
        $(".poke2").show(1000);
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "blue");
        $("#mem3").text("Vaporeon");
        $(".poke3").show(1000);
      });


    </script>
  </body>
</html>
